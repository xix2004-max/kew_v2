backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "../assets/images"

collections:
  - name: "catalog_settings"
    label: "Inventory Matrix Manager"
    delete: false
    files:
      - name: "products_list"
        label: "Master Product Inventory Database"
        file: "pages/products.json"
        format: "json"
        json_root: "" # Yeh Decap ko batayega ki file direct [ array ] se shuru ho rahi hai
        fields:
          - name: "products"
            label: "Product Array Inventory"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - name: "id"
                label: "Unique Code ID"
                widget: "string"
              - name: "category"
                label: "Category"
                widget: "string"
              - name: "title"
                label: "Product Title"
                widget: "string"
              - name: "badge"
                label: "Badge Text"
                widget: "string"
              - name: "image"
                label: "Product Image"
                widget: "image"
              - name: "short_desc"
                label: "Short Description"
                widget: "text"
              - name: "specs"
                label: "Technical Structural Specifications (Key-Value Pair)"
                widget: "object"
                fields:
                  - name: "Material"
                    label: "Material"
                    widget: "string"
                    required: false
                  - name: "Dimensions"
                    label: "Dimensions"
                    widget: "string"
                    required: false
                  - name: "Thickness"
                    label: "Thickness (For Gears)"
                    widget: "string"
                    required: false
                  - name: "Standard"
                    label: "Standard (For Gears)"
                    widget: "string"
                    required: false
                  - name: "Tolerances"
                    label: "Tolerances (For Shafts)"
                    widget: "string"
                    required: false
                  - name: "Concentricity"
                    label: "Concentricity (For Shafts)"
                    widget: "string"
                    required: false
                  - name: "Lubrication"
                    label: "Lubrication (For Bushes)"
                    widget: "string"
                    required: false
                  - name: "Finishing"
                    label: "Finishing (For Bushes)"
                    widget: "string"
                    required: false
                  - name: "Quality Testing"
                    label: "Quality Testing (For Spares)"
                    widget: "string"
                    required: false
                  - name: "Deployment"
                    label: "Deployment (For Spares)"
                    widget: "string"
                    required: false
