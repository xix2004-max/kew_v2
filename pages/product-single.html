<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Product Details | Kamala Engineering Works</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .product-detail-section { padding: 80px 0; background: var(--bg-primary); }
        .detail-split-layout { display: table; width: 100%; table-layout: fixed; }
        .detail-media-panel { display: table-cell; width: 45%; vertical-align: top; padding-right: 40px; }
        .detail-info-panel { display: table-cell; width: 55%; vertical-align: top; }
        
        .main-showcase-img { width: 100%; border: 1px solid rgba(255,255,255,0.04); background: var(--bg-secondary); }
        
        .spec-table { width: 100%; border-collapse: collapse; margin: 30px 0; font-size: 0.9rem; }
        .spec-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .spec-table td { padding: 14px 10px; color: var(--text-muted); }
        .spec-table td.spec-label { width: 35%; font-family: var(--font-nav); color: var(--text-main); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        
        .back-to-catalog { display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none; font-family: var(--font-nav); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .detail-media-panel, .detail-info-panel { display: block; width: 100%; padding: 0; }
            .detail-media-panel { margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="container nav-wrapper">
            <a href="../index.html" class="logo-text">KAMALA<span>ENGINEERING</span></a>
        </div>
    </header>

    <section class="product-detail-section">
        <div class="container">
            <a href="products.html" class="back-to-catalog">← Return to Component Catalogue</a>
            
            <div class="detail-split-layout">
                <!-- Left Hand Side Display Box -->
                <div class="detail-media-panel">
                    <img id="product-target-img" src="" alt="" class="main-showcase-img">
                </div>
                
                <!-- Right Hand Side Display Info Panel -->
                <div class="detail-info-panel">
                    <span id="product-target-badge" class="section-subtitle" style="margin-bottom:10px; display:inline-block;">Loading Matrix...</span>
                    <h1 id="product-target-title" style="margin-top:0; font-size:2.5rem; color:var(--text-main);">Industrial Asset Title</h1>
                    <p id="product-target-desc" style="color:var(--text-muted); line-height:1.6; font-size:0.95rem;"></p>
                    
                    <h3 style="margin-top:40px; font-family:var(--font-nav); text-transform:uppercase; font-size:1rem; border-left:3px solid var(--accent-orange); padding-left:10px;">Technical Blueprint Profiles</h3>
                    <table class="spec-table" id="product-target-specs"></table>

                    <div style="margin-top: 40px;">
                        <a id="rfq-button-target" href="request-quote.html" class="btn btn-primary">Initiate Custom RFQ Sizing Quote</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Extract URL parameter ID profile string
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            window.location.href = "products.html"; // Safe escape fallback route
        }

        fetch('products.json')
            .then(res => res.json())
            .then(data => {
                const product = data.find(p => p.id === productId);
                if (!product) {
                    window.location.href = "products.html";
                    return;
                }
                populatePageTemplate(product);
            })
            .catch(err => console.error("Error evaluating specific item parameters:", err));

        function populatePageTemplate(product) {
            document.getElementById('page-title').textContent = `${product.title} | Kamala Engineering Works`;
            document.getElementById('product-target-img').src = product.image;
            document.getElementById('product-target-img').alt = product.title;
            document.getElementById('product-target-badge').textContent = product.badge;
            document.getElementById('product-target-title').textContent = product.title;
            document.getElementById('product-target-desc').textContent = product.short_desc;
            document.getElementById('rfq-button-target').href = `request-quote.html?item=${product.id}`;

            const specsTable = document.getElementById('product-target-specs');
            specsTable.innerHTML = "";
            for (const [key, value] of Object.entries(product.specs)) {
                specsTable.innerHTML += `
                    <tr>
                        <td class="spec-label">${key}</td>
                        <td>${value}</td>
                    </tr>
                `;
            }
        }
    </script>
</body>
</html>
