<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products | Kamala Engineering Works</title>
    <!-- Tailwind CSS for sleek catalog rendering -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Client JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header Navigation -->
    <header class="border-b border-gray-800 bg-gray-950 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold tracking-wider text-orange-500">KAMALA ENGINEERING WORKS</a>
            <nav class="space-x-4">
                <a href="../index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="about.html" class="hover:text-orange-500 transition">About</a>
                <a href="products.html" class="text-orange-500 font-semibold">Products</a>
                <a href="contact.html" class="hover:text-orange-500 transition">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-6xl w-full mx-auto p-6 md:p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 pb-4 border-b border-gray-800">
            <div>
                <h1 class="text-3xl font-bold text-gray-100">Engineering Catalog</h1>
                <p class="text-gray-400 mt-1">High-precision manufactured machine components and spare parts</p>
            </div>
            
            <!-- Category Filter Buttons -->
            <div id="filter-buttons" class="flex flex-wrap gap-2 mt-4 md:mt-0">
                <button onclick="filterCategory('all')" id="btn-all" class="px-4 py-2 rounded text-sm font-semibold bg-orange-600 text-white transition">All Components</button>
                <button onclick="filterCategory('gears')" id="btn-gears" class="px-4 py-2 rounded text-sm font-semibold bg-gray-800 hover:bg-gray-700 text-gray-300 transition">Gears</button>
                <button onclick="filterCategory('shafts')" id="btn-shafts" class="px-4 py-2 rounded text-sm font-semibold bg-gray-800 hover:bg-gray-700 text-gray-300 transition">Shafts</button>
                <button onclick="filterCategory('bushes')" id="btn-bushes" class="px-4 py-2 rounded text-sm font-semibold bg-gray-800 hover:bg-gray-700 text-gray-300 transition">Bushes</button>
                <button onclick="filterCategory('spareparts')" id="btn-spareparts" class="px-4 py-2 rounded text-sm font-semibold bg-gray-800 hover:bg-gray-700 text-gray-300 transition">Spare Parts</button>
            </div>
        </div>

        <!-- Loading / Status Placeholder -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-t-orange-500 border-gray-700 mb-4"></div>
            <p class="text-gray-400">Fetching live inventory database...</p>
        </div>

        <!-- Dynamic Product Catalog Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Products get injected here dynamically -->
        </div>

        <!-- Empty State Placeholder -->
        <div id="no-products" class="text-center py-20 hidden">
            <p class="text-gray-400 text-lg">No products found matching this category yet.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-gray-950 p-6 text-center text-sm text-gray-500">
        &copy; 2026 Kamala Engineering Works. All rights reserved.
    </footer>

    <script>
        // ==========================================
        // CONFIGURATION PARAMETERS (Match Admin Panel Credentials)
        // ==========================================
        const SUPABASE_URL = "https://sriirikxnwjdyoebrtex.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_rIRT7hFR0vJdJbhYHUgjgQ_A3SKTAQi";

        // Initialize Supabase Connection
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let localProducts = []; // Stores products locally once downloaded

        // 1. Core Fetch Engine
        async function loadProducts() {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                localProducts = data;
                renderProducts(localProducts);

            } catch (err) {
                console.error("Error loading products:", err);
                document.getElementById('loading').innerHTML = `
                    <p class="text-red-500 font-bold">Failed to load live catalog data.</p>
                    <p class="text-gray-500 text-sm mt-1">${err.message}</p>
                `;
            }
        }

        // 2. HTML Injection & Layout Renderer
        function renderProducts(productsList) {
            const grid = document.getElementById('products-grid');
            const loader = document.getElementById('loading');
            const emptyState = document.getElementById('no-products');

            loader.classList.add('hidden');
            grid.innerHTML = "";

            if (productsList.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            productsList.forEach(product => {
                const badgeHTML = product.badge 
                    ? `<span class="bg-orange-950 text-orange-400 border border-orange-800/50 text-[11px] font-bold uppercase tracking-wider px-2.5 py-0.5 rounded-full">${product.badge}</span>` 
                    : '';

                // Link to product detail pages dynamically appending the ID parameter
                const detailLink = `product-single.html?id=${encodeURIComponent(product.id)}`;

                const cardHtml = `
                    <div class="bg-gray-800 border border-gray-700/65 rounded-lg overflow-hidden flex flex-col group hover:border-orange-500/50 hover:shadow-xl hover:shadow-orange-950/10 transition-all duration-300">
                        <div class="relative aspect-video bg-gray-950 overflow-hidden">
                            <img src="${product.image || 'https://placehold.co/600x400/1f2937/9ca3af?text=No+Image'}" 
                                 alt="${product.title}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 loading="lazy">
                        </div>
                        <div class="p-5 flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex items-center justify-between gap-2 mb-2">
                                    <span class="text-xs text-orange-500 uppercase tracking-wider font-semibold">${product.category}</span>
                                    ${badgeHTML}
                                </div>
                                <h3 class="text-lg font-bold text-gray-100 group-hover:text-orange-400 transition-colors">${product.title}</h3>
                                <p class="text-gray-400 text-sm mt-2 line-clamp-2">${product.short_desc}</p>
                            </div>
                            <div class="mt-5">
                                <a href="${detailLink}" class="block text-center bg-gray-700 hover:bg-orange-600 text-white font-bold py-2 rounded text-sm tracking-wide transition duration-300">
                                    View Technical Specifications
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        // 3. Client Filter Trigger Actions
        function filterCategory(category) {
            // Highlight Selected Button
            const buttons = document.querySelectorAll('#filter-buttons button');
            buttons.forEach(btn => {
                btn.classList.remove('bg-orange-600', 'text-white');
                btn.classList.add('bg-gray-800', 'hover:bg-gray-700', 'text-gray-300');
            });

            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-gray-800', 'hover:bg-gray-700', 'text-gray-300');
                activeBtn.classList.add('bg-orange-600', 'text-white');
            }

            // Filter Dataset
            if (category === 'all') {
                renderProducts(localProducts);
            } else {
                const filtered = localProducts.filter(p => p.category === category);
                renderProducts(filtered);
            }
        }

        // Start Fetching Process on Load
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
