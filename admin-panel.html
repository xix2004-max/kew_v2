<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Catalog Manager | Kamala Engineering Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans p-6">

    <div class="max-w-3xl mx-auto w-full bg-gray-800 border border-gray-700 rounded-lg p-6 shadow-xl">
        <h1 class="text-2xl font-bold text-orange-500 mb-2">Local Catalog Manager</h1>
        <p class="text-gray-400 text-sm mb-6">Add components locally. This will generate a downloadable updated JSON file to replace your existing one.</p>

        <!-- Form to add a new product -->
        <form id="product-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Product ID (slug)</label>
                <input type="text" id="id" required placeholder="e.g., helical-gear-02" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Category</label>
                    <select id="category" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white">
                        <option value="gears">Gears</option>
                        <option value="shafts">Shafts</option>
                        <option value="bushes">Bushes</option>
                        <option value="spareparts">Spare Parts</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Badge / Tag</label>
                    <input type="text" id="badge" placeholder="e.g., Heavy Duty" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Product Title</label>
                <input type="text" id="title" required placeholder="e.g., High Torque Helical Gear" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Image URL</label>
                <input type="url" id="image" placeholder="https://placehold.co/600x400..." class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Short Description</label>
                <textarea id="short_desc" rows="2" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white" placeholder="Brief card summary..."></textarea>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="bg-orange-600 hover:bg-orange-500 text-white font-bold px-6 py-2 rounded transition">
                    Add to Local Array
                </button>
            </div>
        </form>

        <!-- Status & Export Section -->
        <div class="mt-8 border-t border-gray-700 pt-6">
            <h2 class="text-lg font-semibold mb-2">Export Updated Data</h2>
            <p class="text-gray-400 text-xs mb-4">Current items staged in memory: <span id="item-count" class="font-bold text-orange-400">0</span></p>
            
            <button id="download-btn" onclick="downloadJSON()" class="bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-2 rounded transition hidden">
                Download Updated products.json
            </button>
        </div>
    </div>

    <script>
        let productsData = [];

        // Load existing products.json on startup so we can append to it
        async function initAdmin() {
            try {
                const res = await fetch('./products.json');
                if (res.ok) {
                    productsData = await res.json();
                    updateCounter();
                }
            } catch (err) {
                console.log("No existing products.json found yet, starting fresh.");
            }
        }

        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const newProduct = {
                id: document.getElementById('id').value.trim(),
                category: document.getElementById('category').value,
                badge: document.getElementById('badge').value.trim(),
                title: document.getElementById('title').value.trim(),
                image: document.getElementById('image').value.trim() || 'https://placehold.co/600x400/1f2937/9ca3af?text=No+Image',
                short_desc: document.getElementById('short_desc').value.trim()
            };

            // Push to local array
            productsData.push(newProduct);
            updateCounter();

            // Reset form
            this.reset();
            alert("Product added to memory staging area! Click the download button below to update your products.json file.");
        });

        function updateCounter() {
            const countEl = document.getElementById('item-count');
            const downloadBtn = document.getElementById('download-btn');
            countEl.textContent = productsData.length;
            if (productsData.length > 0) {
                downloadBtn.classList.remove('hidden');
            }
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(productsData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "products.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        window.addEventListener('DOMContentLoaded', initAdmin);
    </script>
</body>
</html>
